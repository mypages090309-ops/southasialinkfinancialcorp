<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAFC Financing</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <nav class="navbar">
    <h2>SAFC</h2>
    <ul>
      <li><a href="#services">Services</a></li>
      <li><a href="#calculator">Calculator</a></li>
      <li><a href="#contact">Apply</a></li>
    </ul>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-box">
    <h1>Fast & Reliable Financing</h1>
    <p>Truck • SUV • OR/CR Sangla • Land Title Loans</p>
    <a href="#contact" class="btn">Apply Now</a>
  </div>
</section>

<!-- SERVICES -->
<section id="services" class="section">
  <h2>Our Services</h2>
  <div class="cards">

    <div class="card">🚛 Truck Loan</div>
    <div class="card">🚙 SUV Loan</div>
    <div class="card">📄 OR/CR Sangla</div>
    <div class="card">🏡 Land Title Loan</div>

  </div>
</section>

<!-- CALCULATOR -->
<section id="calculator" class="section">
  <h2>Loan Calculator</h2>

  <div class="calculator">
    <input type="number" id="amount" placeholder="Loan Amount">
    <input type="number" id="months" placeholder="Months">
    <button onclick="calc()">Compute</button>
    <h3 id="result"></h3>
  </div>
</section>

<!-- FORM -->
<section id="contact" class="section">
  <div class="form-box">
    <h2>Apply Now</h2>

    <form id="form">
      <input type="text" id="name" placeholder="Full Name" required>
      <input type="text" id="phone" placeholder="Phone Number" required>

      <select id="loan">
        <option>Truck Loan</option>
        <option>SUV Loan</option>
        <option>OR/CR Sangla</option>
        <option>Land Title Loan</option>
      </select>

      <button type="submit">Submit Application</button>
    </form>
  </div>
</section>

<footer>
  <p>© 2026 SAFC</p>
</footer>

<a href="https://www.facebook.com/safcgapan" target="_blank" class="messenger">
💬 Chat
</a>

<script src="script.js"></script>
</body>
</html>
