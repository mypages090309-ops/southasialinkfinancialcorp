<!DOCTYPE html>
<html>
<head>
  <title>SAFC Financing</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>SAFC Loan Application</h1>

<form id="form">
  <input type="text" id="name" placeholder="Full Name" required>
  <input type="text" id="phone" placeholder="Phone Number" required>

  <select id="loan">
    <option>Truck Loan</option>
    <option>SUV Loan</option>
    <option>OR/CR Sangla</option>
    <option>Land Title Loan</option>
  </select>

  <button type="submit">Submit Application</button>
</form>

<h2>Loan Calculator</h2>

<input type="number" id="amount" placeholder="Loan Amount">
<input type="number" id="months" placeholder="Months">
<button onclick="calc()">Compute</button>

<p id="result"></p>

<script src="script.js"></script>
</body>
</html>
